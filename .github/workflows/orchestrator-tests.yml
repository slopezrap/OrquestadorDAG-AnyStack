name: Orchestrator tests

# Validates the five-file source-of-truth orchestrator framework that lives outside any
# concrete app — hooks, skills, scripts and the bootstrap parser. Runs on
# every push and PR. Four independent jobs (each on a fresh runner) so a
# failure in one path does not mask another.

on:
  push:
    branches: [main]
    paths:
      - ".claude/**"
      - "scripts/**"
      - "docs/product-baseline/**"
      - "docs/templates/**"
      - "docs/guides/**"
      - "docs/source-of-truth/**"
      - "docs/README.md"
      - "README.md"
      - "CHEATSHEET.md"
      - "docs/guides/CHATGPT_DAG_SOURCE_OF_TRUTH_GUIDE.md"
      - "docs/prompts/**"
      - "examples/golden-real-app/**"
      - ".claude/schemas/**"
      - "AUDIT_REPORT.md"
      - ".github/workflows/orchestrator-tests.yml"
  pull_request:
    paths:
      - ".claude/**"
      - "scripts/**"
      - "docs/product-baseline/**"
      - "docs/templates/**"
      - "docs/guides/**"
      - "docs/source-of-truth/**"
      - "docs/README.md"
      - "README.md"
      - "CHEATSHEET.md"
      - "docs/guides/CHATGPT_DAG_SOURCE_OF_TRUTH_GUIDE.md"
      - "docs/prompts/**"
      - "examples/golden-real-app/**"
      - ".claude/schemas/**"
      - "AUDIT_REPORT.md"
      - ".github/workflows/orchestrator-tests.yml"
  workflow_dispatch:

jobs:
  # ----------------------------------------------------------------------
  # 1) Lint: Python compile, JSON validation, bash syntax + shellcheck.
  # ----------------------------------------------------------------------
  lint:
    name: Lint (python + json + bash + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python compile (.claude/bin)
        # python3 -B affects implicit imports only, NOT explicit `compileall`,
        # so __pycache__ would land in the working tree. We clean it up below.
        run: python3 -m compileall -q .claude/bin scripts

      - name: Clean compileall byproducts
        run: |
          find .claude -type d -name '__pycache__' -prune -exec rm -rf {} +
          find .claude -type f -name '*.pyc' -delete

      - name: Validate settings JSON
        run: |
          python3 -m json.tool .claude/settings.json > /dev/null
          if [ -f .claude/settings.local.example.json ]; then
            python3 -m json.tool .claude/settings.local.example.json > /dev/null
          fi

      - name: Run orchestrator audits
        run: |
          python3 -B -S scripts/audit-agent-reality.py
          python3 -B -S scripts/audit-agent-trailer-vocabulary.py
          python3 -B -S scripts/audit-template-screen-journey-redactor.py
          python3 -B -S scripts/audit-orchestrator-refactor-consistency.py

      - name: Validate orchestrator schemas and doctor
        run: |
          bash scripts/validate-orchestrator-schemas.sh --json
          bash scripts/orchestrator-doctor.sh --json

      - name: Golden real app smoke
        run: python3 -B -S examples/golden-real-app/verify_golden_app.py --json

      - name: Bash syntax check (bash -n)
        run: |
          set -e
          for f in scripts/*.sh .claude/bin/*.sh .claude/enforcers/*.sh .claude/git-workflows/*.sh; do
            [ -f "$f" ] || continue
            bash -n "$f"
            echo "ok: $f"
          done

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Shellcheck
        # SC1091: do not follow `source`d files (they are runtime-conditional).
        # SC2088: tildes inside quoted strings are user-facing log messages
        #         (uninstall scripts show "~/.claude" as a hint), not paths
        #         meant to expand — the actual paths use $HOME explicitly.
        run: |
          set -e
          for f in scripts/*.sh .claude/bin/*.sh .claude/enforcers/*.sh .claude/git-workflows/*.sh; do
            [ -f "$f" ] || continue
            shellcheck --severity=warning -e SC1091 -e SC2088 "$f"
          done

  # ----------------------------------------------------------------------
  # 2) Tests: full suite on Python 3.11 + 3.12.
  #
  # The suite mixes two styles — unittest.TestCase classes and pytest-style
  # plain functions that rely on conftest.py fixtures. unittest discover
  # picks up the TestCase branch; pytest picks up both branches. We run
  # pytest as the canonical runner so neither
  # branch is silently lost. The unittest discover step is kept as a
  # belt-and-braces sanity check so a regression that breaks the unittest
  # branch (e.g. someone removes inheritance from TestCase) is still loud.
  # ----------------------------------------------------------------------
  tests:
    name: Unit tests (python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install pytest
        run: python3 -m pip install --quiet pytest

      - name: Run pytest (canonical — picks up unittest.TestCase + pytest-style)
        run: python3 -m pytest .claude/bin/tests/ -v

      - name: Run unittest discover (sanity check, subset of pytest)
        # If this fails but pytest passes, someone broke a TestCase
        # inheritance and the test is still being seen by pytest as a
        # plain function — visible warning that the contract drifted.
        run: python3 -m unittest discover -s .claude/bin/tests -p 'test_*.py'

  # ----------------------------------------------------------------------
  # 3) Bootstrap end-to-end on the active source-of-truth. Optional
  #    docs/product-baseline history must never be promoted over the checked-in
  #    docs/source-of-truth during CI. Verifies
  #    registry+runtime-state generation and that NO mutable artifact lands
  #    inside `.claude/`.
  # ----------------------------------------------------------------------
  bootstrap-source-of-truth:
    name: Bootstrap (active source-of-truth)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect active source-of-truth
        id: sot
        run: |
          set -e
          # This orchestrator ZIP intentionally ships with no built app and no default baseline.
          # If docs/source-of-truth is empty, skip the active-app bootstrap job; template smoke/audits
          # still validate that a new app can be generated from docs/templates.
          has_sot=yes
          test -s docs/source-of-truth/instrucciones.md || has_sot=no
          test -s docs/source-of-truth/UX_CONTRACT.md || has_sot=no
          test -s docs/source-of-truth/STACK_PROFILE.yaml || has_sot=no
          test -n "$(find docs/source-of-truth -maxdepth 1 -type f -name '*_TECHNICAL_GUIDE.md' -print -quit)" || has_sot=no
          test -n "$(find docs/source-of-truth -maxdepth 1 -type f -name '*_IMPLEMENTATION_CHECKLIST.md' -print -quit)" || has_sot=no
          if [ "$has_sot" = yes ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "active source-of-truth present"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "no active source-of-truth yet; use docs/templates to generate one"
          fi

      - name: Run bootstrap (validate + refresh)
        if: steps.sot.outputs.present == 'true'
        # `-B` disables bytecode writing on automatic imports — keeps
        # __pycache__ from contaminating .claude/bin/ during this job.
        run: |
          set -e
          python3 -B .claude/bin/bootstrap_source_of_truth.py --validate-only
          python3 -B .claude/bin/bootstrap_source_of_truth.py --refresh

      - name: Strict journey-matrix check
        if: steps.sot.outputs.present == 'true'
        run: bash scripts/check-journey-matrix.sh --strict

      - name: Strict task-DAG check
        if: steps.sot.outputs.present == 'true'
        run: bash scripts/check-task-dag.sh --strict

      - name: Strict wiring-contract check
        if: steps.sot.outputs.present == 'true'
        run: bash scripts/check-wiring-contract.sh --strict --require-new-template-columns

      - name: Defensive cleanup of any byproduct caches
        if: steps.sot.outputs.present == 'true'
        # Belt-and-braces: even with -B, a sub-process could re-enable bytecode.
        # Clean before asserting "no mutable artifacts under .claude/".
        run: |
          find .claude -type d -name '__pycache__' -prune -exec rm -rf {} +
          find .claude -type f -name '*.pyc' -delete

      - name: Assert orchestrator-state landed outside .claude/
        if: steps.sot.outputs.present == 'true'
        run: |
          set -e
          # Mutable artifacts must NEVER land inside .claude/. Two separate
          # finds: -type d for stray dirs, -type f for stray files.
          dir_leaks="$(find .claude -type d \( -name '__pycache__' -o -name 'tasks' -o -name 'memory' \) -print)"
          file_leaks="$(find .claude -type f \( -name '*.pyc' -o -name 'registry.json' -o -name 'runtime-state.json' -o -name 'ledger.jsonl' \) -print)"
          if [ -n "$dir_leaks$file_leaks" ]; then
            echo "❌ Unexpected mutable artifacts under .claude/:"
            echo "$dir_leaks"
            echo "$file_leaks"
            exit 1
          fi
          # Registry + runtime-state must exist under orchestrator-state/.
          test -f orchestrator-state/tasks/registry.json
          test -f orchestrator-state/tasks/runtime-state.json
          echo "ok: bootstrap landed under orchestrator-state/, .claude/ stayed static"

  # ----------------------------------------------------------------------
  # 4) Bootstrap MUST refuse to run when source-of-truth is empty. This
  #    closes the contract loophole "the five-file source-of-truth rule is enforced when
  #    the docs are missing too", not just when present.
  # ----------------------------------------------------------------------
  bootstrap-rejects-empty:
    name: Bootstrap rejects empty source-of-truth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Empty source-of-truth
        run: |
          mkdir -p docs/source-of-truth
          rm -rf docs/source-of-truth/*
          # Keep the placeholder so the dir is not deleted.
          touch docs/source-of-truth/.gitkeep

      - name: Bootstrap must refuse
        run: |
          set +e
          python3 .claude/bin/bootstrap_source_of_truth.py --validate-only
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "❌ Bootstrap returned 0 with no source-of-truth docs — the contract is broken."
            exit 1
          fi
          echo "ok: bootstrap exited ${rc} as expected"
